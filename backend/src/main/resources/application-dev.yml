spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true
        use_sql_comments: true

  datasource:
    url: jdbc:postgresql://localhost:5432/hiremind_dev
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5

logging:
  level:
    root: INFO
    com.hiremind: DEBUG
    org.springframework: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: dev-secret-key-change-in-production
  expiration: 86400000

server:
  port: 8080
